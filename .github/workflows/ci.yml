name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck-and-test:
    name: typecheck + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Typecheck (all workspaces)
        run: pnpm -r typecheck

      - name: Test (all workspaces)
        run: pnpm -r test

  migration-smoke-test:
    name: migration smoke test (Postgres 15)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: fokker_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Apply bootstrap migration
        env:
          PGPASSWORD: ci
        run: psql -h localhost -U postgres -d fokker_ci -v ON_ERROR_STOP=1 -f infra/migrations/0001_initial.sql

      - name: Apply 0002 (fleet_variant += B737)
        env:
          PGPASSWORD: ci
        run: psql -h localhost -U postgres -d fokker_ci -v ON_ERROR_STOP=1 -f infra/migrations/0002_fleet_variant_b737.sql

      - name: Assert RLS isolates tenants
        env:
          PGPASSWORD: ci
        run: |
          psql -h localhost -U postgres -d fokker_ci -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO operators (id, legal_name, trading_name, short_code, aoc_number,
                                  accountable_manager_name, accountable_manager_email, config)
          VALUES
            ('11111111-1111-1111-1111-111111111111', 'A', 'A', 'A', 'AOC-A', 'AM A', 'a@example', '{}'::jsonb),
            ('22222222-2222-2222-2222-222222222222', 'B', 'B', 'B', 'AOC-B', 'AM B', 'b@example', '{}'::jsonb);
          INSERT INTO fleets (operator_id, variant, display_name) VALUES
            ('11111111-1111-1111-1111-111111111111', 'F70', 'A F70'),
            ('22222222-2222-2222-2222-222222222222', 'F100', 'B F100');

          SET ROLE app_runtime;
          RESET app.operator_id;
          DO $$
          DECLARE n integer;
          BEGIN
            SELECT count(*) INTO n FROM fleets;
            IF n <> 0 THEN RAISE EXCEPTION 'expected 0 unscoped, got %', n; END IF;
          END$$;

          BEGIN;
            SET LOCAL app.operator_id = '11111111-1111-1111-1111-111111111111';
            DO $$
            DECLARE n integer;
            BEGIN
              SELECT count(*) INTO n FROM fleets;
              IF n <> 1 THEN RAISE EXCEPTION 'expected 1 for A, got %', n; END IF;
            END$$;
          COMMIT;
          SQL

      - name: Assert audit_events is append-only
        env:
          PGPASSWORD: ci
        run: |
          psql -h localhost -U postgres -d fokker_ci -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO audit_events (entity_type, entity_id, action, request_id, ip_address)
          VALUES ('test', 'x', 'CREATE', 'req-1', '127.0.0.1');

          DO $$
          BEGIN
            BEGIN
              UPDATE audit_events SET entity_id = 'y';
              RAISE EXCEPTION 'UPDATE should have been blocked';
            EXCEPTION WHEN raise_exception THEN
              IF SQLERRM = 'UPDATE should have been blocked' THEN RAISE; END IF;
            END;

            BEGIN
              DELETE FROM audit_events;
              RAISE EXCEPTION 'DELETE should have been blocked';
            EXCEPTION WHEN raise_exception THEN
              IF SQLERRM = 'DELETE should have been blocked' THEN RAISE; END IF;
            END;
          END$$;
          SQL

      - name: Assert audit_events RLS isolates tenants
        env:
          PGPASSWORD: ci
        run: |
          psql -h localhost -U postgres -d fokker_ci -v ON_ERROR_STOP=1 <<'SQL'
          -- Operators A and B were inserted by the earlier RLS step (same DB).
          INSERT INTO audit_events (operator_id, entity_type, entity_id, action, request_id, ip_address)
          VALUES
            ('11111111-1111-1111-1111-111111111111', 'pilot', 'pa', 'CREATE', 'req-a', '127.0.0.1'),
            ('22222222-2222-2222-2222-222222222222', 'pilot', 'pb', 'CREATE', 'req-b', '127.0.0.1');

          SET ROLE app_runtime;
          BEGIN;
            SET LOCAL app.operator_id = '11111111-1111-1111-1111-111111111111';
            DO $$
            DECLARE total integer; foreign_rows integer;
            BEGIN
              SELECT count(*) INTO total FROM audit_events;
              SELECT count(*) INTO foreign_rows FROM audit_events
                WHERE operator_id <> '11111111-1111-1111-1111-111111111111'::uuid;
              IF foreign_rows <> 0 THEN
                RAISE EXCEPTION 'tenant A leaked % cross-tenant/global audit rows', foreign_rows;
              END IF;
              IF total <> 1 THEN
                RAISE EXCEPTION 'tenant A expected exactly its 1 audit row, saw %', total;
              END IF;
            END$$;
          COMMIT;

          -- A tenant must NOT be able to insert an audit row for another operator.
          BEGIN;
            SET LOCAL app.operator_id = '11111111-1111-1111-1111-111111111111';
            DO $$
            BEGIN
              BEGIN
                INSERT INTO audit_events (operator_id, entity_type, entity_id, action, request_id, ip_address)
                  VALUES ('22222222-2222-2222-2222-222222222222', 'pilot', 'evil', 'CREATE', 'r', '1.1.1.1');
                RAISE EXCEPTION 'cross-tenant audit INSERT should have been blocked';
              EXCEPTION WHEN insufficient_privilege THEN
                NULL; -- expected: WITH CHECK rejects it
              END;
            END$$;
          ROLLBACK;
          SQL

  api-integration-tests:
    name: api integration tests (Postgres 15)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: fokker_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply bootstrap migration
        env:
          PGPASSWORD: ci
        run: psql -h localhost -U postgres -d fokker_ci -v ON_ERROR_STOP=1 -f infra/migrations/0001_initial.sql

      - name: Apply 0002 (fleet_variant += B737)
        env:
          PGPASSWORD: ci
        run: psql -h localhost -U postgres -d fokker_ci -v ON_ERROR_STOP=1 -f infra/migrations/0002_fleet_variant_b737.sql

      - name: Seed demo operators + fleets for integration tests
        env:
          PGPASSWORD: ci
        run: |
          psql -h localhost -U postgres -d fokker_ci -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO operators (id, legal_name, trading_name, short_code, aoc_number,
                                  accountable_manager_name, accountable_manager_email, config)
          VALUES
            ('11111111-1111-1111-1111-111111111111', 'JAK Demo', 'JAK Demo', 'JAK-DEMO', 'KE-AOC-1', 'AM J', 'j@ex', '{"workosOrganizationId":"org_jak_demo"}'::jsonb),
            ('22222222-2222-2222-2222-222222222222', 'I-Fly Demo', 'I-Fly Demo', 'IFLY-DEMO', 'KE-AOC-2', 'AM I', 'i@ex', '{"workosOrganizationId":"org_ifly_demo"}'::jsonb);
          INSERT INTO fleets (id, operator_id, variant, display_name) VALUES
            -- JAK = B737NG type-extensibility preview demo
            ('11111111-aaaa-aaaa-aaaa-000000000001', '11111111-1111-1111-1111-111111111111', 'B737', 'JAK B737NG Fleet (preview)'),
            -- I-Fly = F70/100 production-ready demo
            ('22222222-aaaa-aaaa-aaaa-000000000001', '22222222-2222-2222-2222-222222222222', 'F70', 'I-Fly F70 Fleet'),
            ('22222222-aaaa-aaaa-aaaa-000000000002', '22222222-2222-2222-2222-222222222222', 'F70-HGW', 'I-Fly F70 HGW Fleet'),
            ('22222222-aaaa-aaaa-aaaa-000000000003', '22222222-2222-2222-2222-222222222222', 'F100', 'I-Fly F100 Fleet');
          ALTER USER app_runtime WITH PASSWORD 'ci';
          SQL

      - name: Run @dnca/api integration tests
        env:
          DATABASE_URL: postgres://app_runtime:ci@localhost:5432/fokker_ci
          NODE_ENV: development
          PORT: '3001'
        run: pnpm --filter @dnca/api test
